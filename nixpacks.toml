[phases.setup]
nixPkgs = ["php82Extensions.pdo_mysql", "php82Extensions.pdo_sqlite", "php82Extensions.bcmath"]

[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader"
]

[phases.build]
cmds = [
  "npm install",
  "npm run build",
  "php artisan storage:link",
  "php artisan config:cache",
  "php artisan view:cache"
]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"
